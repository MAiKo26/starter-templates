root = true

[build]
cmd = "go build -o bin/server ./"
bin = "bin/server"
delay = 1000

[build.exclude_dir]
dirs = ["vendor", "bin"]

[build.include_ext]
exts = ["go", "tpl", "tmpl", "html"]

[build.stop_on_error]
stop_on_error = false

[log]
time = true

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true
